<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>生写真コレクション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>井上和</h1>
        <button id="openModalBtn" class="add-button">セット追加</button>
    </header>
    <main id="set-container"></main>
    <!--Modal-->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>新しいセット</h2>

            <label>セット名:</label>
            <input type="text" id="modalSetName" placeholder="13th Anniversary">

            <label>ID:</label>
            <input type="text" id="modalSetID" placeholder="13TH-ANNV">

            <label>枚数:</label>
            <select id="modalTotal">
                <option value="3">3枚</option>
                <option value="4">4枚</option>
                <option value="5">5枚</option>
            </select>

            <label>発売年月</label>
            <div class="row">
                <input type="number" id="modalYear" placeholder="YYYY">
                <input type="number" id="modalMonth" placeholder="MM">
            </div>

            <label>リリース順</label>
            <input type="number" id="modalIndex" placeholder="ID">

            <div class="modal-buttons">
                <button id="saveSetBtn" class="save-button">保存</button>
                <button id="closeModalBtn" class="cancel-button">キャンセル</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
