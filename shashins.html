<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --surface2: #222226;
    --surface3: #2a2a30;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #c084fc;
    --accent2: #a855f7;
    --accent-dim: rgba(168,85,247,0.15);
    --accent-glow: rgba(192,132,252,0.25);
    --text: #f4f4f5;
    --text2: #a1a1aa;
    --text3: #71717a;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.12);
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: baseline; gap: 10px; }
  .header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .header-sub { font-size: 13px; color: var(--text3); }
  .header-stats { display: flex; gap: 16px; }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill strong { color: var(--text); font-size: 13px; }
  /* Toolbar */
  .toolbar {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap .icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text3); margin-right: 2px; }
  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .btn:hover { background: var(--surface3); border-color: var(--border2); color: var(--text); }
  .btn.active { background: var(--accent-dim); border-color: var(--accent2); color: var(--accent); }
  .btn-add {
    background: var(--accent2);
    border: 1px solid var(--accent2);
    color: #fff;
    margin-left: auto;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .btn-add:hover { background: var(--accent); }
  /* Tag chips */
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  /* Main grid */
  .main { padding: 20px 24px; }
  .sets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  /* Set card */
  .set-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .set-card:hover { border-color: var(--border2); }
  .set-card.complete { border-color: rgba(74,222,128,0.25); }
  .set-card.complete:hover { border-color: rgba(74,222,128,0.45); }
  .card-top { display: flex; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.4; flex: 1; transition: color 0.15s; }
  .card-id { font-size: 10px; color: var(--text3); font-family: monospace; margin-top: 1px; }
  .desc-line { font-size: 11px; color: var(--text3); margin-bottom: 10px; min-height: 14px; }
  /* Parts row */
  .parts-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .part-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: var(--text3);
    cursor: default;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }
  .part-btn.owned {
    background: var(--accent-dim);
    border-color: rgba(168,85,247,0.4);
    color: var(--accent);
  }
  .part-btn.owned::before {
    content: '✓';
    font-size: 10px;
    font-weight: 700;
  }
  /* Clickable card */
  .set-card { cursor: pointer; }
  .set-card:hover .card-name { color: var(--accent); }
  /* Modal part toggle buttons */
  .modal-part-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .modal-part-btn:hover { border-color: var(--border2); color: var(--text2); }
  .modal-part-btn.owned {
    background: var(--accent-dim);
    border-color: rgba(168,85,247,0.4);
    color: var(--accent);
  }
  .modal-part-btn.owned::before { content: '✓'; font-size: 10px; font-weight: 700; }
  .btn-danger { padding: 9px 16px; border-radius: var(--radius); border: 1px solid rgba(248,113,113,0.3); background: var(--red-dim); color: var(--red); cursor: pointer; font-size: 13px; margin-right: auto; }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }
  /* Dialog modal */
  .dialog-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 360px;
    max-width: calc(100vw - 40px);
  }
  .dialog-modal p { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
  /* Progress bar */
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-fill.full { background: var(--green); }
  .progress-count { font-size: 11px; color: var(--text3); min-width: 32px; text-align: right; }
  /* Card tags */
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty p { margin-top: 8px; font-size: 13px; }
  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding-top: 80px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 560px;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; letter-spacing: 0.03em; text-transform: uppercase; }
  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent2); }
  /* Combo box */
  .combo-wrap { position: relative; }
  .combo-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .combo-input:focus { border-color: var(--accent2); }
  .combo-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .combo-dropdown.open { display: block; }
  .combo-item {
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .combo-item:last-child { border-bottom: none; }
  .combo-item:hover, .combo-item.focused { background: var(--surface3); }
  .combo-item-name { font-size: 13px; color: var(--text); }
  .combo-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .combo-no-results { padding: 12px; color: var(--text3); font-size: 12px; text-align: center; }
  /* Parts preview */
  .parts-preview { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .part-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text2);
  }
  /* Tag editor in modal */
  .tag-editor { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    user-select: none;
  }
  .tag-toggle:hover { border-color: var(--border2); }
  .tag-toggle.on { background: var(--accent-dim); border-color: rgba(168,85,247,0.4); color: var(--accent); }
  .custom-tag-row { display: flex; gap: 6px; margin-top: 8px; }
  .custom-tag-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .custom-tag-input:focus { border-color: var(--accent2); }
  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
  }
  .btn-sm:hover { background: var(--surface3); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
  .btn-cancel { padding: 9px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 13px; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-confirm { padding: 9px 18px; border-radius: var(--radius); background: var(--accent2); border: none; color: white; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-confirm:hover { background: var(--accent); }
  /* Section headers */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 8px;
    margin-bottom: 4px;
  }
  .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .section-count { font-size: 11px; color: var(--text3); }
  /* Tag filter row */
  .tag-search-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    min-width: 200px;
    cursor: text;
    transition: border-color 0.15s;
  }
  .tag-search-bar:focus-within { border-color: var(--accent2); }
  .tag-chip-active {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .tag-chip-active:hover { opacity: 0.75; }
  .tag-search-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    min-width: 80px;
    flex: 1;
    padding: 3px 0;
  }
  .tag-suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    z-index: 50;
    min-width: 140px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .tag-suggestions.open { display: block; }
  .tag-suggestion-item {
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .tag-suggestion-item:last-child { border-bottom: none; }
  .tag-suggestion-item:hover { background: var(--surface3); }
  .tag-search-wrap { position: relative; }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  /* Group view option */
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { padding: 6px 10px; font-size: 12px; }
  .no-sets { padding: 40px 0; text-align: center; color: var(--text3); font-size: 13px; }
  @media (max-width: 600px) {
    .header {
      padding: 12px 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header-stats {
      width: 100%;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stat-pill { font-size: 11px; padding: 3px 10px; }

    .toolbar {
      padding: 10px 16px;
      gap: 8px;
    }
    .search-wrap { max-width: 100%; width: 100%; }
    .filter-row { width: 100%; }

  </div>
</div>

<div class="toolbar">

  <div class="filter-row">

    </div>
  </div>
  <div class="filter-row" id="tag-filter-row"></div>
  <div class="filter-row">
    <span class="filter-label">Show:</span>
    <button class="btn active" data-status-filter="all" onclick="setStatusFilter('all')">すべて</button>

  <button class="btn-add" onclick="openAddModal()">セット追加</button>
</div>

<div class="main">

</div>

<!-- Add Set Modal -->
<div class="modal-overlay" id="add-modal">

// Dialog helpers
function showAlert(title, message) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-message').textContent = message;
  document.getElementById('dialog-actions').innerHTML =
    `<button class="btn-confirm" onclick="closeDialog()">OK</button>`;
  document.getElementById('dialog-modal').classList.add('open');
}

function showConfirm(title, message, onConfirm) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-message').textContent = message;
  document.getElementById('dialog-actions').innerHTML =
    `<button class="btn-cancel" onclick="closeDialog()">Cancel</button>
     <button class="btn-danger" onclick="closeDialog();(${onConfirm})()">Remove</button>`;
  document.getElementById('dialog-modal').classList.add('open');
}

function closeDialog() {
  document.getElementById('dialog-modal').classList.remove('open');
}
document.getElementById('dialog-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDialog(); });
// Settings modal
function openSettingsModal() {
  document.getElementById('settings-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('settings-gist-id').value = localStorage.getItem('gist_id') || '';
  document.getElementById('settings-status').textContent = '';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettingsModal() {
  document.getElementById('settings-modal').classList.remove('open');
}
document.getElementById('settings-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettingsModal(); });

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const gistId = document.getElementById('settings-gist-id').value.trim();
  if (!token || !gistId) {
    setSettingsStatus('トークンとGist IDを入力してください', 'error'); return;
  }
  localStorage.setItem('gh_token', token);
  localStorage.setItem('gist_id', gistId);
  closeSettingsModal();
  setSyncLabel('syncing');
  syncFromGist().then(() => render());
}

async function testGistConnection() {
  const token = document.getElementById('settings-token').value.trim();
  const gistId = document.getElementById('settings-gist-id').value.trim();
  if (!token || !gistId) { setSettingsStatus('トークンとGist IDを入力してください', 'error'); return; }
  setSettingsStatus('接続中…', 'info');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    setSettingsStatus('✓ 接続成功', 'success');
  } catch(e) {
    setSettingsStatus(`✗ 失敗: ${e.message}`, 'error');
  }
}

function setSettingsStatus(msg, type) {
  const el = document.getElementById('settings-status');
  el.textContent = msg;
  el.style.color = type === 'error' ? 'var(--red)' : type === 'success' ? 'var(--green)' : 'var(--text2)';
}

// Sync status indicator
function setSyncLabel(state, detail) {
  const icon = document.getElementById('sync-icon');
  const label = document.getElementById('sync-label');
  const wrap = document.getElementById('sync-status');
  if (state === 'syncing') {
    icon.textContent = '↻'; label.textContent = '同期中…';
    wrap.style.color = 'var(--text2)';
  } else if (state === 'ok') {
    icon.textContent = '✓'; label.textContent = detail || '同期済';
    wrap.style.color = 'var(--green)';
  } else if (state === 'error') {
    icon.textContent = '✗'; label.textContent = detail || 'エラー';
    wrap.style.color = 'var(--red)';
  } else {
    icon.textContent = '⚙'; label.textContent = '設定';
    wrap.style.color = 'var(--text3)';
  }
}

// Gist API
function getGistConfig() {
  return {
    token: localStorage.getItem('gh_token'),
    gistId: localStorage.getItem('gist_id')
  };
}

async function syncFromGist() {
  const { token, gistId } = getGistConfig();
  if (!token || !gistId) return;
  setSyncLabel('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const file = data.files['shashins-collection.json'];
    if (!file) throw new Error('ファイルが見つかりません');
    const remote = JSON.parse(file.content || '{}');
    collection = remote;
    saveAllToIDB();
    const now = new Date();
    setSyncLabel('ok', `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 同期済`);
  } catch(e) {
    setSyncLabel('error', 'Gist読み込み失敗');
    console.error('Gist sync error:', e);
  }
}

async function pushToGist() {
  const { token, gistId } = getGistConfig();
  if (!token || !gistId) return;
  setSyncLabel('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { 'shashins-collection.json': { content: JSON.stringify(collection) } }
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const now = new Date();
    setSyncLabel('ok', `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 同期済`);
  } catch(e) {
    setSyncLabel('error', 'Gist書き込み失敗');
    console.error('Gist push error:', e);
  }
}

// IndexedDB (local cache for offline)
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('shashins_db', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('collection')) d.createObjectStore('collection', {keyPath:'setId'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function loadFromIDB() {
  return new Promise(res => {
    const tx = db.transaction('collection','readonly');
    const req = tx.objectStore('collection').getAll();
    req.onsuccess = () => {
      collection = {};
      req.result.forEach(r => collection[r.setId] = r);
      res();
    };
  });
}
function saveAllToIDB() {
  const tx = db.transaction('collection','readwrite');
  const store = tx.objectStore('collection');
  store.clear();
  Object.values(collection).forEach(e => store.put(e));
}
let pushTimer = null;
function schedulePush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => pushToGist(), 2000);
}

function saveEntry(entry) {
  const tx = db.transaction('collection','readwrite');
  tx.objectStore('collection').put(entry);
  schedulePush();
}
function deleteEntry(setId) {
  const tx = db.transaction('collection','readwrite');
  tx.objectStore('collection').delete(setId);
  schedulePush();
}

// Collection helpers
function getEntry(setId) { return collection[setId]; }
function getParts(type) { return SET_TYPES[type]?.parts || []; }
function ownedCount(entry, type) {
  if (!entry) return 0;
  return getParts(type).filter(p => entry.parts && entry.parts[p]).length;
}

// Render
function render() {
  const container = document.getElementById('sets-container');
  let sets = MASTER_SETS.filter(s => {
    if (typeFilter !== 'all' && s.type !== typeFilter) return false;
    if (searchQ && !s.name.toLowerCase().includes(searchQ) && !s.id.toLowerCase().includes(searchQ) && !s.desc.toLowerCase().includes(searchQ)) return false;
    const entry = getEntry(s.id);
    if (statusFilter === 'complete') {
      if (!entry) return false;
      const total = getParts(s.type).length;
      if (ownedCount(entry, s.type) < total) return false;
    } else if (statusFilter === 'partial') {
      if (!entry) return false;
      const cnt = ownedCount(entry, s.type);
      if (cnt === 0 || cnt === getParts(s.type).length) return false;
    } else if (statusFilter === 'none') {
      if (entry && ownedCount(entry, s.type) > 0) return false;
    }
    if (tagFilters.size > 0) {
      if (!entry || !entry.tags || ![...tagFilters].every(t => entry.tags.includes(t))) return false;
    }
    return true;
  });

  // Only show sets in collection unless search/filter active
  const showAll = searchQ || typeFilter !== 'all' || statusFilter !== 'all' || tagFilters.size > 0;  
  const inCollection = sets.filter(s => !!getEntry(s.id));
  const notInCollection = sets.filter(s => !getEntry(s.id));

  let html = '';
  if (inCollection.length === 0 && !showAll) {
    html = '<div class="empty"><div style="font-size:32px;margin-bottom:8px;">📸</div><p>No sets in your collection yet.<br>Click "+ Add Set" to get started.</p></div>';
  } else {
    if (inCollection.length > 0) {
      html += `<div class="section-header"><span class="section-title">In Collection</span><span class="section-count">${inCollection.length} set${inCollection.length!==1?'s':''}</span></div>`;
      html += '<div class="sets-grid">' + inCollection.map(s => renderCard(s, true)).join('') + '</div>';
    }
    if (showAll && notInCollection.length > 0) {
      html += `<div class="section-header" style="margin-top:24px;"><span class="section-title">Not owned</span><span class="section-count">${notInCollection.length} set${notInCollection.length!==1?'s':''}</span></div>`;
      html += '<div class="sets-grid">' + notInCollection.map(s => renderCard(s, false)).join('') + '</div>';
    }
    if (inCollection.length === 0 && !showAll) {
      html = '<div class="empty"><div style="font-size:32px;margin-bottom:8px;">📸</div><p>No sets in your collection yet.<br>Click "+ Add Set" to get started.</p></div>';
    }
  }
  container.innerHTML = html;
  updateStats();
}

function renderCard(s, inColl) {
  const entry = getEntry(s.id);
  const parts = getParts(s.type);
  const owned = ownedCount(entry, s.type);
  const total = parts.length;
  const isComplete = owned === total && inColl;
  const pct = total > 0 ? Math.round((owned / total) * 100) : 0;

  const partsHtml = parts.map(p => {
    const isOwned = entry && entry.parts && entry.parts[p];
    return `<span class="part-btn ${isOwned ? 'owned' : ''}">${p}</span>`;
  }).join('');

  let tagsHtml = '';
  if (entry && entry.tags && entry.tags.length > 0) {
    const sortedTags = [...entry.tags].sort((a, b) => {
      const ai = ALL_TAGS.indexOf(a), bi = ALL_TAGS.indexOf(b);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
    tagsHtml = '<div class="card-tags">' + sortedTags.map(t => `<span class="tag-chip" style="${tagStyle(t)}">${t}</span>`).join('') + '</div>';
  }

  const clickHandler = inColl ? `onclick="openEditModal('${s.id}')"` : `onclick="openAddModalForSet('${s.id}')"`;

  return `<div class="set-card ${isComplete ? 'complete' : ''}" ${clickHandler}>
    <div class="card-top">
      <div>
        <div class="card-name">${s.name}</div>
        <div class="card-id">${s.id}${s.desc ? ' · ' + s.desc : ''}</div>
      </div>
    </div>
    <div class="parts-row">${partsHtml}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill ${isComplete ? 'full' : ''}" style="width:${pct}%"></div></div>
      <span class="progress-count">${owned}/${total}</span>
    </div>
    ${tagsHtml}
  </div>`;
}

function updateStats() {
  const total = Object.keys(collection).length;
  let ownedParts = 0, totalParts = 0;
  Object.values(collection).forEach(entry => {
    const s = MASTER_SETS.find(x => x.id === entry.setId);
    if (!s) return;
    const parts = getParts(s.type);
    totalParts += parts.length;
    ownedParts += parts.filter(p => entry.parts && entry.parts[p]).length;
  });
  const complete = Object.entries(collection).filter(([id, entry]) => {
    const s = MASTER_SETS.find(x => x.id === id);
    if (!s) return false;
    return ownedCount(entry, s.type) === getParts(s.type).length;
  }).length;
  document.getElementById('header-stats').innerHTML = `
    <div class="stat-pill">Sets <strong>${total}</strong></div>
    <div class="stat-pill">Complete <strong style="color:var(--green)">${complete}</strong></div>
    <div class="stat-pill">Parts <strong>${ownedParts}/${totalParts}</strong></div>`;
}

// Edit modal state
let editSetId = null;
let editModalParts = {};
let editModalTags = new Set();

function openEditModal(setId) {
  const entry = collection[setId];
  if (!entry) return;
  const s = MASTER_SETS.find(x => x.id === setId);
  if (!s) return;
  editSetId = setId;
  editModalParts = Object.assign({}, entry.parts || {});
  editModalTags = new Set(entry.tags || []);

  document.getElementById('edit-modal-title').textContent = s.name;
  document.getElementById('edit-modal-sub').textContent = s.id + (s.desc ? ' · ' + s.desc : '');
  renderEditParts(s);
  renderEditTags();
  document.getElementById('edit-modal').classList.add('open');
}

function renderEditParts(s) {
  const parts = getParts(s.type);
  document.getElementById('edit-modal-parts').innerHTML = parts.map(p => {
    const owned = !!editModalParts[p];
    return `<button class="modal-part-btn ${owned ? 'owned' : ''}" onclick="toggleEditPart('${p}')">${p}</button>`;
  }).join('');
}

function toggleEditPart(part) {
  editModalParts[part] = !editModalParts[part];
  const s = MASTER_SETS.find(x => x.id === editSetId);
  renderEditParts(s);
}

function renderEditTags() {
  const container = document.getElementById('edit-modal-tags');
  container.innerHTML = ALL_TAGS.map(t => {
    const on = editModalTags.has(t);
    return `<span class="tag-toggle ${on ? 'on' : ''}" onclick="toggleEditTag('${t}')">${t}</span>`;
  }).join('');
}

function toggleEditTag(tag) {
  if (editModalTags.has(tag)) editModalTags.delete(tag);
  else editModalTags.add(tag);
  renderEditTags();
}

function addEditCustomTag() {
  const v = document.getElementById('edit-custom-tag-input').value.trim();
  if (!v) return;
  editModalTags.add(v);
  document.getElementById('edit-custom-tag-input').value = '';
  renderEditTags();
}

function confirmEdit() {
  if (!editSetId) return;
  const entry = collection[editSetId];
  if (!entry) return;
  entry.parts = Object.assign({}, editModalParts);
  entry.tags = [...editModalTags];
  saveEntry(entry);
  closeEditModal();
  render();
}

function removeSetFromEdit() {
  if (!editSetId) return;
  const s = MASTER_SETS.find(x => x.id === editSetId);
  showConfirm('Remove set', `Remove "${s ? s.name : editSetId}" from your collection?`, function() {
    delete collection[editSetId];
    deleteEntry(editSetId);
    closeEditModal();
    render();
  });
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editSetId = null;
}

document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

// Filters
function setTypeFilter(t) {
  typeFilter = t;
  document.querySelectorAll('[data-type-filter]').forEach(b => b.classList.toggle('active', b.dataset.typeFilter === t));
  render();
}
function setStatusFilter(s) {
  statusFilter = s;
  document.querySelectorAll('[data-status-filter]').forEach(b => b.classList.toggle('active', b.dataset.statusFilter === s));
  render();
}
function renderTagChips() {
  document.getElementById('tag-chips-active').innerHTML = [...tagFilters].map(t =>
    `<span class="tag-chip-active" style="${tagStyle(t)}" onclick="removeTagFilter('${t}')">${t} ✕</span>`
  ).join('');
}

function addTagFilter(tag) {
  tagFilters.add(tag);
  document.getElementById('tag-search-input').value = '';
  document.getElementById('tag-suggestions').classList.remove('open');
  renderTagChips();
  render();
}

function removeTagFilter(tag) {
  tagFilters.delete(tag);
  renderTagChips();
  render();
}

const tagSearchInput = document.getElementById('tag-search-input');
const tagSuggestions = document.getElementById('tag-suggestions');

tagSearchInput.addEventListener('input', () => {
  const q = tagSearchInput.value.toLowerCase().trim();
  const available = ALL_TAGS.filter(t => !tagFilters.has(t) && t.includes(q));
  if (available.length === 0 || !q) { tagSuggestions.classList.remove('open'); return; }
  tagSuggestions.innerHTML = available.map(t =>
    `<div class="tag-suggestion-item" onmousedown="addTagFilter('${t}')">${t}</div>`
  ).join('');
  tagSuggestions.classList.add('open');
});

tagSearchInput.addEventListener('focus', () => {
  const q = tagSearchInput.value.toLowerCase().trim();
  const available = ALL_TAGS.filter(t => !tagFilters.has(t));
  if (available.length === 0) return;
  tagSuggestions.innerHTML = available.map(t =>
    `<div class="tag-suggestion-item" onmousedown="addTagFilter('${t}')">${t}</div>`
  ).join('');
  tagSuggestions.classList.add('open');
});

tagSearchInput.addEventListener('blur', () => {
  setTimeout(() => tagSuggestions.classList.remove('open'), 150);
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  render();
});

// Add Modal
let addModalParts = {};

function openAddModal() {
  selectedSetId = null;
  modalSelectedTags = new Set();
  addModalParts = {};
  document.getElementById('combo-input').value = '';
  document.getElementById('set-preview').style.display = 'none';
  document.getElementById('combo-dropdown').classList.remove('open');
  renderModalTags();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('combo-input').focus(), 50);
}

function openAddModalForSet(setId) {
  openAddModal();
  const s = MASTER_SETS.find(x => x.id === setId);
  if (!s) return;
  selectedSetId = setId;
  document.getElementById('combo-input').value = s.name;
  showSetPreview(s);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}
document.getElementById('add-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });

function renderModalTags() {
  const container = document.getElementById('modal-tags');
  container.innerHTML = ALL_TAGS.map(t => {
    const on = modalSelectedTags.has(t);
    return `<span class="tag-toggle ${on ? 'on' : ''}" onclick="toggleModalTag('${t}')">${t}</span>`;
  }).join('');
}
function toggleModalTag(tag) {
  if (modalSelectedTags.has(tag)) modalSelectedTags.delete(tag);
  else modalSelectedTags.add(tag);
  renderModalTags();
}
function addCustomTag() {
  const v = document.getElementById('custom-tag-input').value.trim();
  if (!v) return;
  modalSelectedTags.add(v);
  document.getElementById('custom-tag-input').value = '';
  renderModalTags();
}

// Combo box
const comboInput = document.getElementById('combo-input');
const comboDropdown = document.getElementById('combo-dropdown');

function getAvailableSets() {
  return MASTER_SETS.filter(s => !collection[s.id]);
}
function updateCombo(query) {
  const q = query.toLowerCase().trim();
  const available = getAvailableSets();
  comboItems = q ? available.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.id.toLowerCase().includes(q) ||
    s.desc.toLowerCase().includes(q)
  ) : available;
  comboFocusIndex = -1;
  if (comboItems.length === 0) {
    comboDropdown.innerHTML = '<div class="combo-no-results">No sets found</div>';
  } else {
    comboDropdown.innerHTML = comboItems.slice(0, 50).map((s,i) =>
      `<div class="combo-item" data-idx="${i}" onmousedown="selectComboItem(${i})">
        <div class="combo-item-name">${s.name} <span style="font-size:10px;color:var(--text3);margin-left:4px;">${s.id}</span></div>
        ${s.desc ? `<div class="combo-item-sub">${s.desc}</div>` : ''}
      </div>`
    ).join('');
  }
  comboDropdown.classList.add('open');
}

comboInput.addEventListener('input', e => updateCombo(e.target.value));
comboInput.addEventListener('focus', e => updateCombo(e.target.value));
comboInput.addEventListener('blur', () => setTimeout(() => comboDropdown.classList.remove('open'), 150));
comboInput.addEventListener('keydown', e => {
  const items = comboDropdown.querySelectorAll('.combo-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    comboFocusIndex = Math.min(comboFocusIndex + 1, items.length - 1);
    items.forEach((el,i) => el.classList.toggle('focused', i === comboFocusIndex));
    if (items[comboFocusIndex]) items[comboFocusIndex].scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    comboFocusIndex = Math.max(comboFocusIndex - 1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i === comboFocusIndex));
  } else if (e.key === 'Enter' && comboFocusIndex >= 0) {
    e.preventDefault();
    selectComboItem(comboFocusIndex);
  } else if (e.key === 'Escape') {
    comboDropdown.classList.remove('open');
  }
});

function selectComboItem(idx) {
  const s = comboItems[idx];
  if (!s) return;
  selectedSetId = s.id;
  addModalParts = {};
  comboInput.value = s.name;
  comboDropdown.classList.remove('open');
  showSetPreview(s);
}

function showSetPreview(s) {
  const preview = document.getElementById('set-preview');
  document.getElementById('preview-desc').textContent = s.desc || '';
  renderAddModalParts(s);
  preview.style.display = 'block';
}

function renderAddModalParts(s) {
  const parts = getParts(s.type);
  document.getElementById('add-modal-parts').innerHTML = parts.map(p => {
    const owned = !!addModalParts[p];
    return `<button class="modal-part-btn ${owned ? 'owned' : ''}" onclick="toggleAddPart('${p}')">${p}</button>`;
  }).join('');
}

function toggleAddPart(part) {
  addModalParts[part] = !addModalParts[part];
  const s = MASTER_SETS.find(x => x.id === selectedSetId);
  if (s) renderAddModalParts(s);
}

function toggleAllAddParts() {
  const s = MASTER_SETS.find(x => x.id === selectedSetId);
  if (!s) return;
  const parts = getParts(s.type);
  const allOwned = parts.every(p => addModalParts[p]);
  parts.forEach(p => addModalParts[p] = !allOwned);
  renderAddModalParts(s);
}

function confirmAdd() {
  if (!selectedSetId) { document.getElementById('combo-input').focus(); return; }
  if (collection[selectedSetId]) { showAlert('Already added', 'This set is already in your collection.'); return; }
  const entry = { setId: selectedSetId, parts: Object.assign({}, addModalParts), tags: [...modalSelectedTags] };
  collection[selectedSetId] = entry;
  saveEntry(entry);
  closeAddModal();
  render();
}

// Init
openDB().then(() => loadFromIDB()).then(() => {
  render();
  const { token, gistId } = getGistConfig();
  if (token && gistId) {
    syncFromGist().then(() => render());
  } else {
    setSyncLabel('idle');
  }
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddModal(); closeEditModal(); closeDialog(); closeSettingsModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openAddModal(); }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
